# Docker Compose - Produção Azure
# Uso: docker-compose -f docker-compose.prod.yml up -d
#
# IMPORTANTE: Configure as variáveis de ambiente no arquivo .env
# IP do Servidor: 4.228.96.10
# Porta: 443 (HTTPS)

version: '3.8'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: blueprint-ia-db-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blueprint-network-prod
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ============================================
  # Backend - Node.js + Prisma
  # ============================================
  backend:
    image: ${DOCKER_REGISTRY:-blueprintia}/backend:${TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blueprint-ia-backend-prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@blueprint-ia.com}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      MAIL_SENDER_ADDRESS: ${MAIL_SENDER_ADDRESS:-}
      BASE_URL: ${BASE_URL:-https://agentica.sysmap.com.br}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - blueprint-network-prod
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
      replicas: 1

  # ============================================
  # Frontend - React + Nginx (HTTPS)
  # ============================================
  frontend:
    image: ${DOCKER_REGISTRY:-blueprintia}/frontend:${TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: blueprint-ia-frontend-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - blueprint-network-prod
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data_prod:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/dados/volumes/postgres_data_prod

  uploads_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/dados/volumes/uploads_data

# ============================================
# Networks
# ============================================
networks:
  blueprint-network-prod:
    driver: bridge
