# Docker Compose - Desenvolvimento Local
# Uso: docker-compose up -d

version: '3.8'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: blueprint-ia-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blueprint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blueprint123}
      POSTGRES_DB: ${POSTGRES_DB:-blueprint_ia}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blueprint} -d ${POSTGRES_DB:-blueprint_ia}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blueprint-network

  # ============================================
  # Backend - Node.js + Prisma
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blueprint-ia-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-blueprint}:${POSTGRES_PASSWORD:-blueprint123}@postgres:5432/${POSTGRES_DB:-blueprint_ia}?schema=public
      JWT_SECRET: ${JWT_SECRET:-seu_jwt_secret_aqui_mude_em_producao}
      # Email configuration (opcional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@blueprint-ia.com}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - blueprint-network

  # ============================================
  # Frontend - React + Nginx
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: blueprint-ia-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - blueprint-network

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  blueprint-network:
    driver: bridge
